name: Filter and Merge M3U Playlists - Working

on:
  workflow_dispatch:
  schedule:
    - cron: '40 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install requests

      - name: Run playlist filter
        env:
          URL1: "https://rkdyiptv.pages.dev/Playlist/Testing.m3u" #${{ secrets.PLAYLIST_URL1 }}
          #URL2: ${{ secrets.PLAYLIST_URL2 }}
          URL3: ${{ secrets.PLAYLIST_URL3 }}
          EXTDERM_PLYLST_URL: ${{ secrets.EXTDERM_PLYLST_URL }}
          CLR_PLYLST_URL: ${{ secrets.CLR_PLYLST_URL }}
        run: |
          python customlist_mix.py
          # python Clarity_Channel.py
          # python Cricket.py
          # python Working.py "$URL3" "$URL1" "$URL2"
          
      - name: Commit filtered playlist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add 8b249zhj3vg65us_mix.m3u
          git commit -m "Update playlist"
          git push
