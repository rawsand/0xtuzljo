name: Delete File from Main

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 6,12 * * *'

permissions:
  contents: write   # ✅ required to push commits

jobs:
  delete-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete file2
        run: |
          FILE_TO_DELETE1="8b249zhj3vg65us_mix.m3u"
          if [ -f "$FILE_TO_DELETE2" ]; then
            git rm "$FILE_TO_DELETE2"
          else
            echo "File $FILE_TO_DELETE2 does not exist"
          fi

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Delete $FILE_TO_DELETE2" || echo "No changes to commit"


      - name: Push changes
        run: git push origin main
